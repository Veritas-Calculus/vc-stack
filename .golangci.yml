version: 2

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - gocyclo
    - gosec
    - unconvert
    - bodyclose
    - gocognit
    - godot
    - nolintlint
    - whitespace

linters-settings:
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 30
  gocognit:
    min-complexity: 50

issues:
  exclude-files:
    - ".*rbd_manager\\.go$"
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - gocognit
