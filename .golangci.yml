version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - gocyclo
    - gosec
    - unconvert
    - bodyclose
    - gocognit
    - godot
    - nolintlint
    - whitespace
  settings:
    gocyclo:
      min-complexity: 30
    gocognit:
      min-complexity: 50
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
  exclusions:
    paths:
      - ".*rbd_manager\\.go$"
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
          - gocognit
      # G101/G117: Struct fields matching "secret/token/key" patterns — false positives.
      - linters:
          - gosec
        text: "G101"
      - linters:
          - gosec
        text: "G117"
      # G107/G704: Potential SSRF — internal HTTP calls use validated URLs.
      - linters:
          - gosec
        text: "G107"
      - linters:
          - gosec
        text: "G704"
      # G115: Integer overflow — safe conversions guarded by validation.
      - linters:
          - gosec
        text: "G115"
      # G118: Goroutine with context.Background — intentional for fire-and-forget ops.
      - linters:
          - gosec
        text: "G118"
      # G204: Subprocess with variable — required for infra tooling (OVS, IPMI).
      - linters:
          - gosec
        text: "G204"
        path: "(vpn|baremetal|compute)"
      # G705: XSS via taint — metadata proxy writes controlled content.
      - linters:
          - gosec
        text: "G705"
        path: "metadata"
      # cmd/ entry points have inherently high cyclomatic complexity.
      - path: "^cmd/"
        linters:
          - gocognit
          - gocyclo
      # Large infrastructure functions — refactoring tracked separately.
      - path: "(modules\\.go|driver_ovn_nbctl\\.go|federation\\.go|feature_flags\\.go)"
        linters:
          - gocognit
          - gocyclo
      # Staticcheck suggestions (QF*) — low priority refactoring.
      - linters:
          - staticcheck
        text: "QF1001|QF1003|QF1012|S1025"
      # Empty branches and dot imports are acceptable in specific cases.
      - linters:
          - staticcheck
        text: "SA9003|ST1001"
      # Deprecated comment format — cosmetic only.
      - linters:
          - gocritic
        text: "deprecatedComment"
      # ifElseChain in handler code — switch isn't always clearer.
      - linters:
          - gocritic
        text: "ifElseChain"
      # Comment style for route/API doc comments.
      - linters:
          - godot
        path: "(handler|_advanced|naming)"
      # Unused functions kept for backward compat / future use.
      - linters:
          - unused
        path: "(rbac_mtu_stats|module_registry|network/handlers|storage/service)"
      # SA4011: break in select — acceptable pattern.
      - linters:
          - staticcheck
        text: "SA4011"
      # Compute module large functions — tracked for separate refactoring.
      - path: "(compute/service|firecracker)"
        linters:
          - gocognit
          - gocyclo
