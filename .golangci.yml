version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - gocyclo
    - gosec
    - unconvert
    - bodyclose
    - gocognit
    - godot
    - nolintlint
    - whitespace
  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 30
  exclusions:
    paths:
      - ".*rbd_manager\\.go$"
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
          - gocognit
      # Allow nosec directives to have optional explanations.
      - linters:
          - gosec
        text: "G101"
