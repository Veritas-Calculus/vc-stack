apiVersion: v1
kind: Service
metadata:
  name: {{ include "vc-stack.fullname" . }}-management
  labels:
    {{- include "vc-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: management
spec:
  type: {{ .Values.management.service.type }}
  ports:
    - port: {{ .Values.management.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.management.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "vc-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: management
