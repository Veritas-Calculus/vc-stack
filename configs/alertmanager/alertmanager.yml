# Alertmanager Configuration for VC Stack (Development)
# In production, configure real receivers (Slack, PagerDuty, Email, Webhook).

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s

receivers:
  - name: 'default'
    # Dev: no external receivers, alerts visible in Alertmanager UI at :9093
  - name: 'critical'
    # Dev: no external receivers

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
