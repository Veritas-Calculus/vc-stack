# Fluent Bit Configuration for VC Stack
# Collects structured logs from vc-management and vc-compute,
# forwards to Kafka topics for downstream processing.
#
# Deploy as systemd service or DaemonSet.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# --- Input: vc-management stdout ---
[INPUT]
    Name              tail
    Tag               vc.management
    Path              /var/log/vc-stack/vc-management.log
    Parser            json
    DB                /var/lib/fluent-bit/vc-management.db
    Mem_Buf_Limit     10MB
    Refresh_Interval  5

# --- Input: vc-compute stdout ---
[INPUT]
    Name              tail
    Tag               vc.compute
    Path              /var/log/vc-stack/vc-compute.log
    Parser            json
    DB                /var/lib/fluent-bit/vc-compute.db
    Mem_Buf_Limit     10MB
    Refresh_Interval  5

# --- Input: PostgreSQL logs ---
[INPUT]
    Name              tail
    Tag               vc.postgres
    Path              /var/log/postgresql/*.log
    Parser            syslog-rfc3164
    DB                /var/lib/fluent-bit/postgres.db
    Mem_Buf_Limit     5MB

# --- Input: OVN logs ---
[INPUT]
    Name              tail
    Tag               vc.ovn
    Path              /var/log/ovn/*.log
    Parser            syslog-rfc3164
    DB                /var/lib/fluent-bit/ovn.db
    Mem_Buf_Limit     5MB

# --- Filter: Add metadata ---
[FILTER]
    Name              modify
    Match             vc.*
    Add               cluster vc-stack
    Add               env production

# --- Filter: Route by log level ---
[FILTER]
    Name              rewrite_tag
    Match             vc.*
    Rule              $level ^(error|fatal|panic)$ vc.errors false

# --- Output: Kafka (application logs) ---
[OUTPUT]
    Name              kafka
    Match             vc.management
    Brokers           kafka-1:9092,kafka-2:9092,kafka-3:9092
    Topics            vc.system.logs
    Timestamp_Key     timestamp
    Format            json
    Retry_Limit       5

[OUTPUT]
    Name              kafka
    Match             vc.compute
    Brokers           kafka-1:9092,kafka-2:9092,kafka-3:9092
    Topics            vc.system.logs
    Format            json

# --- Output: Kafka (error logs → separate topic) ---
[OUTPUT]
    Name              kafka
    Match             vc.errors
    Brokers           kafka-1:9092,kafka-2:9092,kafka-3:9092
    Topics            vc.system.errors
    Format            json

# --- Output: Kafka (audit trail) ---
[OUTPUT]
    Name              kafka
    Match             vc.management
    Brokers           kafka-1:9092,kafka-2:9092,kafka-3:9092
    Topics            vc.system.audit
    Format            json
