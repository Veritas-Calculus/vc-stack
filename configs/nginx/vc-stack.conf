# Nginx reverse proxy for VC Stack (Docker Compose)
# All requests proxied to vc-management which serves both
# the API and the frontend static files.
#
# Uses Docker's embedded DNS resolver (127.0.0.11) with a variable-based
# proxy_pass so that nginx re-resolves vc-management's IP on every request.
# This prevents 502 errors when the management container restarts and gets
# a new IP address.

server {
    listen 80;
    server_name _;

    # Handle large JWT Authorization headers (admin users can exceed 10KB)
    large_client_header_buffers 4 16k;

    # Docker embedded DNS — re-resolve every 30s, valid for 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://vc-management:8080;

    client_max_body_size 20G;
    client_body_timeout 600s;

    # WebSocket proxy (VNC console, terminal, etc.)
    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashed static assets (JS/CSS) - immutable, long cache
    location /assets/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else - vc-management (API + static frontend)
    location / {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Handle large JWT tokens (admin users can have 10KB+ tokens)
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 16k;
        # Prevent caching of HTML pages (SPA) so new deployments take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
