# Nginx reverse proxy for VC Stack (Docker Compose)
# All requests proxied to vc-management which serves both
# the API and the frontend static files.

upstream management {
    server vc-management:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20G;
    client_body_timeout 600s;

    # WebSocket proxy (VNC console, terminal, etc.)
    location /ws/ {
        proxy_pass http://management;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashed static assets (JS/CSS) → immutable, long cache
    location /assets/ {
        proxy_pass http://management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → vc-management (API + static frontend)
    location / {
        proxy_pass http://management;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Prevent caching of HTML pages (SPA) so new deployments take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
