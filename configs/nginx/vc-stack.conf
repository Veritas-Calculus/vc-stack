# Nginx reverse proxy for VC Stack (Docker Compose)
# Serves frontend static files and proxies API/WebSocket to vc-management

upstream management {
    server vc-management:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20G;
    client_body_timeout 600s;

    # SPA routing: all non-file requests fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html — never cache (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        access_log off;
    }

    # Static assets — aggressive cache (hashed filenames)
    location ~* ^/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Runtime config
    location /config/ {
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # WebSocket proxy (VNC console, terminal, etc.)
    location /ws/ {
        proxy_pass http://management;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://management;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://management;
        proxy_set_header Host $host;
        access_log off;
    }

    # Metrics
    location /metrics {
        proxy_pass http://management;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
