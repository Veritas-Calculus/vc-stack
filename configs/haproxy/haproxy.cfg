# HAProxy configuration for VC Stack Management Plane HA
#
# Load-balances across multiple vc-management replicas with:
#   - Round-robin distribution
#   - HTTP health checks via /health/liveness
#   - Sticky sessions via cookie (optional)
#   - Stats dashboard on :8404

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout http-request 15m    # Match vc-management read_timeout for uploads

# Stats page: http://<haproxy>:8404/stats
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats admin if TRUE

# Frontend: incoming API traffic
frontend api
    bind *:8080
    default_backend vc_management

# Backend: vc-management replicas
backend vc_management
    balance roundrobin
    option httpchk GET /health/liveness
    http-check expect status 200

    # Cookie-based session persistence (optional, useful for WebSocket/VNC)
    cookie VCMGMT insert indirect nocache

    # Management replicas — in docker-compose.ha.yml, scale with:
    #   docker compose -f docker-compose.ha.yml up -d --scale vc-management=3
    # For now, define static entries that match the HA compose service names.
    server mgmt1 vc-management-1:8080 check cookie mgmt1 fall 3 rise 2 inter 5s
    server mgmt2 vc-management-2:8080 check cookie mgmt2 fall 3 rise 2 inter 5s
    server mgmt3 vc-management-3:8080 check cookie mgmt3 fall 3 rise 2 inter 5s

# PgBouncer health check proxy (optional, for external access to pooler)
frontend pgbouncer_proxy
    bind *:6432
    mode tcp
    default_backend pgbouncer_backend

backend pgbouncer_backend
    mode tcp
    server pgbouncer1 pgbouncer:6432 check inter 10s
