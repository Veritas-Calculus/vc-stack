  lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ceph dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ceph dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-tags ceph -fmt sarif -out gosec-results.sarif -exclude=G101,G104,G107,G110,G115,G204,G304,G306,G402,G501,G505,G705 -exclude-dir=vendor ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web/console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint & Prettier
        run: npm run lint

      - name: Run Vitest unit tests
        run: npm run test

  coverage:
    name: Go Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ceph dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: Run tests with coverage
        run: CGO_ENABLED=0 go test -short -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (30%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "${TOTAL} < 30" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage ${TOTAL}% is below minimum threshold of 30%"
            exit 1
          else
            echo "✅ Coverage ${TOTAL}% meets minimum threshold of 30%"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
