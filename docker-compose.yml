# VC Stack - Local Development Docker Compose
#
# Usage:
#   docker compose up -d                    # Start PG + management + nginx
#   docker compose --profile compute up -d  # Also start compute node (needs KVM)
#   docker compose down -v                  # Stop and remove volumes

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:latest
    container_name: vc-stack-postgres
    environment:
      POSTGRES_DB: vcstack
      POSTGRES_USER: vcstack
      POSTGRES_PASSWORD: vcstack123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vcstack -d vcstack" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vc-stack

  # ---- vc-management ----
  vc-management:
    build:
      context: .
      target: vc-management
    container_name: vc-stack-management
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: vcstack
      DB_USER: vcstack
      DB_PASS: vcstack123
      JWT_SECRET: dev-secret-do-not-use-in-production
      VC_MANAGEMENT_PORT: "8080"
      ADMIN_DEFAULT_PASSWORD: "ChangeMe123!"
      LOGGING_LEVEL: debug
      LOGGING_FORMAT: text
    networks:
      - vc-stack
    restart: unless-stopped

  # ---- Nginx reverse proxy ----
  nginx:
    image: nginx:latest
    container_name: vc-stack-nginx
    depends_on:
      - vc-management
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx/vc-stack.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vc-stack
    restart: unless-stopped

  # ---- vc-compute (optional, needs KVM/OVS on host) ----
  vc-compute:
    build:
      context: .
      target: vc-compute
    container_name: vc-stack-compute
    profiles: [ "compute" ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: vcstack
      DB_USER: vcstack
      DB_PASS: vcstack123
      VC_COMPUTE_PORT: "8081"
      NODE_NAME: dev-compute-1
      CONTROLLER_URL: http://vc-management:8080
      IMAGES_BACKEND: local
      IMAGES_LOCAL_PATH: /var/lib/vcstack/images
      VOLUMES_BACKEND: local
      VOLUMES_LOCAL_PATH: /var/lib/vcstack/volumes
      LOGGING_LEVEL: debug
      LOGGING_FORMAT: text
    privileged: true
    networks:
      - vc-stack
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vc-stack:
    driver: bridge
