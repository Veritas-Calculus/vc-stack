# VC Stack - Local Development Docker Compose
#
# Usage:
#   docker compose up -d                 # Start PostgreSQL only (for local go run)
#   docker compose --profile app up -d   # Start PG + management + nginx (web dev)
#   docker compose --profile full up -d  # Start everything including compute
#   docker compose down -v               # Stop and remove volumes

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:latest
    container_name: vc-stack-postgres
    environment:
      POSTGRES_DB: vcstack
      POSTGRES_USER: vcstack
      POSTGRES_PASSWORD: vcstack123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      # Expose to host ONLY for local go run / debugging
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vcstack -d vcstack" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vc-stack

  # ---- vc-management (no port exposed, nginx proxies) ----
  vc-management:
    build:
      context: .
      target: vc-management
    image: vc-management:latest
    container_name: vc-stack-management
    profiles: [ "app", "full" ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: vcstack
      DB_USER: vcstack
      DB_PASS: vcstack123
      JWT_SECRET: dev-secret-do-not-use-in-production
      VC_MANAGEMENT_PORT: "8080"
      LOGGING_LEVEL: debug
      LOGGING_FORMAT: text
    # No ports exposed — nginx handles external access
    networks:
      - vc-stack
    restart: unless-stopped

  # ---- Nginx reverse proxy ----
  nginx:
    image: nginx:latest
    container_name: vc-stack-nginx
    profiles: [ "app", "full" ]
    depends_on:
      - vc-management
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx/vc-stack.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vc-stack
    restart: unless-stopped

  # ---- vc-compute (no port exposed, internal only) ----
  # NOTE: Compute node requires KVM/OVS on the host.
  # Useful for integration testing only.
  vc-compute:
    build:
      context: .
      target: vc-compute
    image: vc-compute:latest
    container_name: vc-stack-compute
    profiles: [ "full" ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: vcstack
      DB_USER: vcstack
      DB_PASS: vcstack123
      VC_COMPUTE_PORT: "8081"
      NODE_NAME: dev-compute-1
      IMAGES_BACKEND: local
      IMAGES_LOCAL_PATH: /var/lib/vcstack/images
      VOLUMES_BACKEND: local
      VOLUMES_LOCAL_PATH: /var/lib/vcstack/volumes
      LOGGING_LEVEL: debug
      LOGGING_FORMAT: text
    # No ports exposed — management communicates via internal network
    privileged: true
    networks:
      - vc-stack
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vc-stack:
    driver: bridge
